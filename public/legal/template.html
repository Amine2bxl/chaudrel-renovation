<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8C764E" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://chaudrel.be/@@CANONICAL_PATH@@" />

    <title>@@TITLE@@</title>
    <meta name="description" content="@@DESCRIPTION@@" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_BE" />
    <meta property="og:site_name" content="Chaudrel Rénovation" />
    <meta property="og:title" content="@@TITLE@@" />
    <meta property="og:description" content="@@DESCRIPTION@@" />
    <meta property="og:url" content="https://chaudrel.be/@@CANONICAL_PATH@@" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="@@BASE@@favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="@@BASE@@apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="@@CSS_PATH@@" />
  </head>
  <body class="bg-brand-cream text-brand-ink">
    <!-- Navbar simplifiée -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-brand-gold/15 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-5 lg:px-10">
        <div class="flex items-center justify-between h-14 lg:h-[72px]">
          <a href="@@BASE@@" class="flex items-center gap-2.5 group">
            <div class="h-11 w-11 rounded-lg bg-white p-0.5 ring-1 ring-brand-gold/30 flex items-center justify-center">
              <img src="@@BASE@@@@LOGO_PATH@@" alt="Chaudrel — Rénovation" class="h-full w-full object-contain" width="44" height="44" />
            </div>
            <span class="flex flex-col leading-none">
              <span class="font-display text-lg lg:text-xl tracking-[0.1em] font-semibold text-brand-ink">CHAUDREL</span>
              <span class="text-[9px] tracking-[0.2em] uppercase text-brand-gold font-medium">Rénovation</span>
            </span>
          </a>
          <nav class="flex items-center gap-2">
            <a href="@@BASE@@" class="hidden sm:inline-block px-4 py-2 rounded-full text-[13px] font-medium tracking-wide text-brand-ink/70 hover:bg-brand-gold/10 hover:text-brand-gold transition-all duration-200">← Retour au site</a>
            <a href="@@BASE@@#contact" class="px-5 py-2.5 bg-brand-gold text-white text-[12px] tracking-[0.12em] uppercase font-semibold rounded-full hover:bg-[#5E4F34] transition-all duration-300 shadow-lg shadow-brand-gold/20">Consultation gratuite</a>
          </nav>
        </div>
      </div>
    </header>

    <!-- Contenu -->
    <main class="pt-24 lg:pt-32 pb-20 lg:pb-32">
      <article class="max-w-3xl mx-auto px-5 sm:px-8">
        <header class="mb-10 lg:mb-14">
          <p class="text-[11px] tracking-[0.25em] uppercase text-brand-gold font-semibold mb-4">Informations légales</p>
          <h1 class="font-display text-4xl sm:text-5xl lg:text-6xl font-light text-brand-ink leading-[1.1] mb-4">@@PAGE_TITLE@@</h1>
          <p class="text-sm text-brand-ink/50 font-light">Dernière mise à jour : @@LAST_UPDATED@@</p>
        </header>

        <div class="legal-content space-y-8 text-[15px] leading-[1.8] text-brand-ink/80 font-light">
@@BODY@@
        </div>

        <footer class="mt-16 pt-8 border-t border-brand-gold/15">
          <p class="text-sm text-brand-ink/50 font-light mb-4">Une question ?</p>
          <a href="@@BASE@@#contact" class="inline-flex items-center gap-2 px-6 py-3 bg-brand-gold text-white text-[13px] tracking-[0.1em] uppercase font-semibold rounded-full hover:bg-[#5E4F34] transition-all duration-300">
            Nous contacter
          </a>
        </footer>
      </article>
    </main>

    <!-- Footer simplifié -->
    <footer class="bg-[#0D0D0D] text-white/40">
      <div class="h-px bg-gradient-to-r from-transparent via-brand-gold/30 to-transparent" aria-hidden="true"></div>
      <div class="max-w-7xl mx-auto px-5 lg:px-10 py-10">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
          <p class="text-[11px] tracking-wide">© @@YEAR@@ Chaudrel Rénovation. Tous droits réservés.</p>
          <div class="flex gap-5">
            <a href="@@BASE@@legal/politique-confidentialite.html" class="text-[11px] tracking-wide hover:text-brand-gold transition-colors duration-200">Politique de confidentialité</a>
            <a href="@@BASE@@legal/mentions-legales.html" class="text-[11px] tracking-wide hover:text-brand-gold transition-colors duration-200">Mentions légales</a>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
